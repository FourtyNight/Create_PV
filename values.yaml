# Размер хранилища
storageSize: 10Gi

# Путь на хосте, куда будут сохраняться данные (должен существовать на ноде)
hostPath: /nfs/

# Имя PVC, которое будет создано провижинером (должно совпадать)
pvcName: data-nfs-server-provisioner-0

# Namespace, в котором будет создан PVC (тот же, где будет работать провижинер)
pvcNamespace: nfs

# Имя ноды, на которой должен быть создан PV (для hostPath)
nodeName: node1   # замените на имя вашей ноды
